version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: compia_db
    restart: always
    environment:
      POSTGRES_USER: compia
      POSTGRES_PASSWORD: "334166bvkz@compia"
      POSTGRES_DB: compiadb
    ports:
      - "5432:5432"
    volumes:
      - compia_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: compia_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@compia.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  compia_data: